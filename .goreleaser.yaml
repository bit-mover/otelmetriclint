version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: otelmetriclint
    main: ./cmd/otelmetriclint
    binary: otelmetriclint
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: "^.*feat[(\\w)]*:+.*$"
    - title: Bug fixes
      regexp: "^.*fix[(\\w)]*:+.*$"
    - title: Documentation
      regexp: "^.*docs[(\\w)]*:+.*$"
